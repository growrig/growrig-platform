id: open-meteo
name: Open-Meteo
version: "1.0.0"
category: data
description: Local hourly weather observations and forecasts from Open-Meteo.
capabilities:
  - weather.forecast
documentation: README.md
config:
  - key: baseUrl
    label: API URL
    type: url
    required: true
    default: https://api.open-meteo.com
    help: Change only when using an Open-Meteo-compatible proxy.
  - key: timeoutSeconds
    label: Timeout
    type: number
    required: true
    default: "15"
runtime:
  type: builtin
  handler: open-meteo
