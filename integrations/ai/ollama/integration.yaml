id: ollama
name: Ollama
version: "1.0.0"
category: ai
description: Run chat, vision and model discovery against a local or hosted Ollama-compatible API.
capabilities:
  - ai.chat
  - ai.vision
  - ai.models
documentation: README.md
config:
  - key: baseUrl
    label: Server URL
    type: url
    required: true
    default: http://localhost:11434
    placeholder: https://ollama.example.com
    help: Base URL of the Ollama API, without /api.
  - key: apiKey
    label: API key
    type: password
    secret: true
    placeholder: Optional for local Ollama
    help: Sent as a Bearer token for hosted Ollama-compatible services.
  - key: model
    label: Default model
    type: text
    required: true
    default: llama3.2
    placeholder: llama3.2
  - key: timeoutSeconds
    label: Timeout
    type: number
    required: true
    default: "60"
runtime:
  type: builtin
  handler: ollama
