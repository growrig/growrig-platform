id: notification-webhook
name: Notification webhook
version: "1.0.0"
category: notification
description: Send GrowRig notifications to any HTTP webhook without custom runtime code.
capabilities:
  - notification.send
documentation: README.md
config:
  - key: endpoint
    label: Webhook URL
    type: url
    required: true
    placeholder: https://hooks.example.com/growrig
  - key: authorization
    label: Authorization token
    type: password
    secret: true
    help: Optional Bearer token sent with every request.
  - key: timeoutSeconds
    label: Timeout
    type: number
    required: true
    default: "15"
runtime:
  type: http
  test:
    urlField: endpoint
    method: POST
    headers:
      Authorization: "Bearer {{config.authorization}}"
    body:
      event: growrig.integration.test
      title: GrowRig connection test
      message: Your notification webhook is connected.
  operations:
    notification.send:
      urlField: endpoint
      method: POST
      headers:
        Authorization: "Bearer {{config.authorization}}"
      body:
        event: growrig.notification
        title: "{{input.title}}"
        message: "{{input.message}}"
        severity: "{{input.severity}}"
        data: "{{input.data}}"
