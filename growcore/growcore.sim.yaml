# Grow Core — OFFLINE simulator (no Home Assistant, no hardware).
#
# Runs the built-in simulator so you can exercise the whole platform locally:
#
#   go run ./cmd/growcore -config growcore.sim.yaml
#
# Runtime data lives under ./data. On first run Grow Core auto-provisions a
# virtual controller. Running with no config file at all uses simulator defaults
# (db in the process cwd).

server:
  addr: ":8080"
  workDir: data

storage:
  path: growcore.sim.db

control:
  interval: 2s

adapter:
  type: simulator
