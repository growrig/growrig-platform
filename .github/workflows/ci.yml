# Test gate for GrowRig: Go tests + web type-check on every PR and push to main.
# Keeping main green is what makes tagging a release safe — release.yml runs the
# same `make test` before it publishes anything.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: growcore/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        run: cd web && npm ci

      - name: Test (Go + web type-check)
        run: make test
