# Built-in feeding schedules for cannabis.
#
# Each preset is a nutrient chart: an ordered list of products (nutrient lines)
# dosed per week across free-form phases. Phases optionally link to a species
# stage (see species.yaml) via `stage:`. Doses are keyed by product `key`; the
# amount is in the product's `unit`, falling back to the preset's default
# `unit`. A week with no entry for a product means that product isn't fed then.
#
# Transcribed from the BioBizz 2025 nutrient schedule. These are read-only in
# the app; duplicate one to build your own editable variant.
presets:
  - id: biobizz-all-mix
    name: BioBizz All-Mix
    brand: BioBizz
    description: >-
      BioBizz organic schedule for All-Mix and other pre-fertilised, peat-based
      substrates. pH 6.2–6.5; water 2–3× a week. Root·Juice runs through the
      early flowering weeks.
    unit: ml/L
    products:
      - { key: root-juice, label: Root·Juice }
      - { key: bio-grow, label: Bio·Grow }
      - { key: fish-mix, label: Fish·Mix }
      - { key: bio-bloom, label: Bio·Bloom }
      - { key: top-max, label: Top·Max }
      - { key: bio-heaven, label: Bio·Heaven }
      - { key: acti-vera, label: Acti·Vera }
      - { key: microbes, label: Microbes, unit: g/L }
    phases:
      - name: Propagation
        stage: seedling
        weeks:
          - doses: { root-juice: 4, bio-heaven: 2, acti-vera: 2, microbes: 0.4 }
      - name: Vegetative (Growth)
        stage: vegetative
        weeks:
          - doses: { root-juice: 4, bio-grow: 1, fish-mix: 1, bio-heaven: 2, acti-vera: 2, microbes: 0.4 }
      - name: Flowering
        stage: flowering
        weeks:
          - doses: { root-juice: 4, bio-grow: 1, fish-mix: 1, bio-bloom: 1, top-max: 1, bio-heaven: 2, acti-vera: 2, microbes: 0.2 }
          - doses: { root-juice: 4, bio-grow: 1, fish-mix: 1, bio-bloom: 2, top-max: 1, bio-heaven: 2, acti-vera: 2, microbes: 0.2 }
          - doses: { root-juice: 4, bio-grow: 1, fish-mix: 1, bio-bloom: 2, top-max: 1, bio-heaven: 3, acti-vera: 3, microbes: 0.4 }
          - doses: { root-juice: 4, bio-grow: 1, fish-mix: 1, bio-bloom: 3, top-max: 1, bio-heaven: 4, acti-vera: 4, microbes: 0.4 }
          - doses: { bio-grow: 1, fish-mix: 1, bio-bloom: 3, top-max: 1, bio-heaven: 4, acti-vera: 4, microbes: 0.4 }
          - doses: { bio-grow: 1, fish-mix: 1, bio-bloom: 4, top-max: 4, bio-heaven: 5, acti-vera: 5, microbes: 0.2 }
          - doses: { bio-grow: 1, fish-mix: 1, bio-bloom: 4, top-max: 4, bio-heaven: 5, acti-vera: 5, microbes: 0.2 }
          - doses: { bio-grow: 1, fish-mix: 1, bio-bloom: 4, top-max: 4, bio-heaven: 5, acti-vera: 5, microbes: 0.2 }
      - name: Flush (Water)
        stage: flush
        weeks:
          - doses: {}

  - id: biobizz-light-coco-mix
    name: BioBizz Light-Mix / Coco-Mix
    brand: BioBizz
    description: >-
      BioBizz organic schedule for Light-Mix and Coco-Mix (lightly or un-buffered
      substrates), which need feeding from week one. Uses Alg·A·Mic alongside the
      base nutrients. pH 6.2–6.5.
    unit: ml/L
    products:
      - { key: root-juice, label: Root·Juice }
      - { key: bio-grow, label: Bio·Grow }
      - { key: fish-mix, label: Fish·Mix }
      - { key: bio-bloom, label: Bio·Bloom }
      - { key: top-max, label: Top·Max }
      - { key: bio-heaven, label: Bio·Heaven }
      - { key: alg-a-mic, label: Alg·A·Mic }
      - { key: acti-vera, label: Acti·Vera }
      - { key: microbes, label: Microbes, unit: g/L }
    phases:
      - name: Propagation
        stage: seedling
        weeks:
          - doses: { root-juice: 4, bio-heaven: 2, acti-vera: 2, microbes: 0.4 }
      - name: Vegetative (Growth)
        stage: vegetative
        weeks:
          - doses: { root-juice: 4, bio-grow: 2, fish-mix: 2, bio-heaven: 2, acti-vera: 2, microbes: 0.4 }
      - name: Flowering
        stage: flowering
        weeks:
          - doses: { root-juice: 4, bio-grow: 2, fish-mix: 2, bio-bloom: 1, top-max: 1, bio-heaven: 2, alg-a-mic: 1, acti-vera: 2, microbes: 0.2 }
          - doses: { root-juice: 4, bio-grow: 2, fish-mix: 2, bio-bloom: 2, top-max: 1, bio-heaven: 2, alg-a-mic: 2, acti-vera: 2, microbes: 0.2 }
          - doses: { root-juice: 4, bio-grow: 3, fish-mix: 3, bio-bloom: 2, top-max: 1, bio-heaven: 3, alg-a-mic: 2, acti-vera: 3, microbes: 0.4 }
          - doses: { root-juice: 4, bio-grow: 3, fish-mix: 3, bio-bloom: 3, top-max: 1, bio-heaven: 4, alg-a-mic: 3, acti-vera: 4, microbes: 0.4 }
          - doses: { bio-grow: 4, fish-mix: 4, bio-bloom: 3, top-max: 1, bio-heaven: 4, alg-a-mic: 4, acti-vera: 4, microbes: 0.4 }
          - doses: { bio-grow: 4, fish-mix: 4, bio-bloom: 4, top-max: 4, bio-heaven: 5, alg-a-mic: 4, acti-vera: 5, microbes: 0.2 }
          - doses: { bio-grow: 4, fish-mix: 4, bio-bloom: 4, top-max: 4, bio-heaven: 5, alg-a-mic: 4, acti-vera: 5, microbes: 0.2 }
          - doses: { bio-grow: 4, fish-mix: 4, bio-bloom: 4, top-max: 4, bio-heaven: 5, alg-a-mic: 4, acti-vera: 5, microbes: 0.2 }
      - name: Flush (Water)
        stage: flush
        weeks:
          - doses: {}
