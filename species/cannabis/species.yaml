# Cannabis species definition.
#
# `stages` is the ordered cultivation sequence (and the per-stage default daily
# light hours used to seed the photoperiod editor). `cultivarAttributes`
# declares the species-specific fields a cultivar of this species carries; the
# cultivar form renders them dynamically from this list.
label: Cannabis
stages:
  - { name: seedling, lightHours: 18 }
  - { name: vegetative, lightHours: 18 }
  - { name: flowering, lightHours: 12 }
  - { name: flush, lightHours: 12 }
  - { name: drying, lightHours: 0 }
  - { name: cure, lightHours: 0 }
cultivarAttributes:
  - { key: genetics, label: Genetics, type: enum, options: [sativa, indica, hybrid] }
  - { key: floweringType, label: Flowering type, type: enum, options: [photoperiod, autoflowering] }
  - { key: seedType, label: Seed type, type: enum, options: [feminized, regular] }
  - { key: thc, label: THC, type: percent }
  - { key: cbd, label: CBD, type: percent }
  - { key: floweringWeeks, label: Flowering time, type: number, unit: weeks }
# `careActions` lists the manual actions a grower can log against this crop's
# plants, and which form fields each shows. Actions and fields define what is
# relevant; exact amounts/doses stay per-grow and per-event.
careActions:
  - { key: water,      label: Water,         icon: droplet,       fields: [amount, runoff, note],                  quick: true }
  - { key: feed,       label: Feed,          icon: flask-conical, fields: [recipe, amount, ph, ec, runoff, note],  quick: true }
  - { key: inspect,    label: Inspect,       icon: search,        fields: [note, photos],                          quick: true }
  - { key: train,      label: Train,         icon: spline,        fields: [trainType, note, photos] }
  - { key: trim,       label: Trim / prune,  icon: scissors,      fields: [note, photos] }
  - { key: transplant, label: Transplant,    icon: shovel,        fields: [potSize, note] }
  - { key: treat,      label: Spray / treat, icon: spray-can,     fields: [product, note] }
  - { key: flush,      label: Flush,         icon: waves,         fields: [amount, runoff, note] }
  - { key: harvest,    label: Harvest,       icon: sprout,        fields: [note] }
  - { key: custom,     label: Custom,        icon: list-plus,     fields: [note, photos] }
