<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<!-- Set the theme class before first paint so there's no flash of the
		     wrong palette. Mirrors the resolution in src/lib/theme.svelte.ts;
		     defaults to dark when nothing is stored or storage is unavailable. -->
		<script>
			(function () {
				try {
					var pref = localStorage.getItem('growrig-theme');
					var resolved =
						pref === 'light' || pref === 'dark'
							? pref
							: matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';
					var el = document.documentElement;
					el.classList.toggle('dark', resolved === 'dark');
					el.classList.toggle('light', resolved === 'light');
				} catch (e) {}
			})();
		</script>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon-32.png" sizes="32x32" type="image/png" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0c0f0d" />
		<title>GrowRig</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-rig-950 text-rig-100 antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
