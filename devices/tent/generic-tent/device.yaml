brand: Generic
model: Grow tent
connection: n/a
description: >-
  A grow tent is a passive enclosure — GrowRig does not talk to it directly.
  This driver simply lets you record which tent you're growing in so the air
  volume and dimensions are known to the climate model. Pick your product below,
  or choose "Other" and enter the size by hand.
# Concrete tent products supported by this driver. Specs are display metadata
# used to derive air volume; the tent itself has no controllable capabilities.
products:
  - id: mars-hydro-grow-tent-series
    vendor: mars-hydro
    brand: Mars Hydro
    model: Grow Tent Series
    models:
      - id: mars-hydro-2x2
        model: 2'×2' Grow Tent
        specs: { widthCm: 60, depthCm: 60, heightCm: 140 }
      - id: mars-hydro-4x4
        model: 4'×4' Grow Tent
        specs: { widthCm: 120, depthCm: 120, heightCm: 200 }
