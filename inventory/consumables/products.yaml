# Built-in product templates for the Consumables category.
#
# Picking one in the item form pre-fills the item's name, size and columns, and
# binds the item to the product by id (so it can reflect updated definitions
# later). `attributes` keys must match the category's columns (see
# inventory.yaml). `description` is shown on bound items. `variants` are the
# pack sizes the product sells in; each is an object with a `size` label and an
# optional `code` (SKU / barcode, typically distinct per size). `image` is
# optional and, when set, is a path relative to this category directory.
#
# Seed set: the basic BioBizz lineup (https://biobizz.com/products/).
products:
  # --- Fertilizers ---
  - id: biobizz-bio-grow
    image: images/biobizz-bio-grow.jpg
    name: BioBizz Bio·Grow
    description: Organic liquid growth fertilizer with sugar-beet extract; feeds the plant and the soil life through the vegetative stage.
    attributes: { kind: nutrient, brand: BioBizz }
    variants:
      - { size: 250 ml }
      - { size: 500 ml }
      - { size: 1 L }
      - { size: 5 L }
      - { size: 10 L }
      - { size: 20 L }
  - id: biobizz-bio-bloom
    image: images/biobizz-bio-bloom.jpg
    name: BioBizz Bio·Bloom
    description: Organic liquid flowering fertilizer with enzymes and amino acids for flower and fruit development.
    attributes: { kind: nutrient, brand: BioBizz }
    variants:
