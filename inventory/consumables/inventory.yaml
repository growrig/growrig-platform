# Consumables — things used up over a grow and reordered regularly:
# nutrients & additives, growing media, pH/calibration solutions, cleaning
# products, filters and other regularly replaced items.
#
# `columns` declares the category-specific fields an item of this category
# carries; the inventory item form renders them dynamically from this list, and
# the API drops any key not declared here (mirrors species cultivarAttributes).
label: Consumables
description: Nutrients, media, pH & calibration solutions, cleaning products, filters.
icon: flask-conical
order: 1
units: [pcs, L, ml, kg, g]
columns:
  - { key: kind, label: Kind, type: enum, options: [nutrient, additive, media, ph-solution, cleaning, filter] }
  - { key: brand, label: Brand, type: text }
  - { key: expiry, label: Expiry, type: date }
  - { key: lotNumber, label: Lot number, type: text }
